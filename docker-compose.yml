version: "3.9"

services:
  aethel-api:
    build: .
    container_name: aethel-api
    ports:
      - "${AETHEL_PORT:-3000}:3000"
    volumes:
      - aethel-data:/app/data
    environment:
      - AETHEL_DB=/app/data/aethel.db
      - AETHEL_PORT=3000
      - RUST_LOG=${RUST_LOG:-info}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  aethel-data:
    driver: local
